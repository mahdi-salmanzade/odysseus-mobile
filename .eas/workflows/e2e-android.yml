name: e2e-android

# Cloud E2E: build an APK with the `e2e-test` profile, then run the Maestro flows
# against it on an EAS-hosted Android Emulator. Triggered on PRs. Requires the
# `e2e-test` build profile in eas.json (see TESTING.md).
on:
  pull_request:
    branches: ['main']

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: e2e-test
  maestro_test:
    needs: [build_android]
    type: maestro
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      flow_path:
        - .maestro/launch.yml
        - .maestro/manual-validation.yml
        - .maestro/unreachable-server.yml
